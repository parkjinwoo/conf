# tmux.conf — Ctrl+b 누르면 단축키 힌트 표시
# 기본 tmux 단축키 변경 없음. 상태바 줄 수: status 1 (정보만) / status 2 (정보+힌트)
# 레이아웃: tmux new-session \; source-file ~/.config/tmux/layouts/agent.conf

# 기본 옵션
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
setw -g pane-base-index 1
set -sg escape-time 0
set -g history-limit 50000
set -g status-interval 1
set -g mouse on
set -g set-clipboard on
set -g mode-style 'bg=#f9e2af,fg=#1e1e2e'

# 테마 (Catppuccin Mocha)
set -g status-style "bg=#313244,fg=#cdd6f4"
set -g status-left " #[fg=#89b4fa,bold]#{session_name} #[default]"
set -g status-left-length 20
set -g status-right " %H:%M "
set -g status-right-length 10
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "
setw -g window-status-separator ""
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#45475a"

# 2줄 상태바: 윗줄=window/session, 아랫줄=Ctrl+b 시 단축키 힌트
set -g status 2
run-shell "~/.config/tmux/scripts/statusbar.sh"
