# layouts/agent.conf — 에이전트 코딩 레이아웃
# alias 예시:
#   alias tmx-agent='tmux new-session \; source-file ~/.config/tmux/layouts/agent.conf'

# 좌우 50:50 분할
split-window -h -p 50 -c "#{pane_current_path}"

# 오른쪽을 3등분
split-window -v -p 66 -c "#{pane_current_path}"
split-window -v -p 50 -c "#{pane_current_path}"

# pane 이름
select-pane -t 1 -T "agent"
select-pane -t 2 -T "editor"
select-pane -t 3 -T "git"
select-pane -t 4 -T "term"

# 앱 실행
send-keys -t 2 'nvim' Enter
send-keys -t 3 'lazygit' Enter

# agent pane 포커스
select-pane -t 1
